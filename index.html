<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Datei Download Upload</title>

<style>
body{
    font-family: Arial, sans-serif;
    padding:20px;
}

button{
    padding:10px 15px;
    margin-top:10px;
    cursor:pointer;
}

.file{
    margin-top:10px;
}
</style>

</head>
<body>

<h1>Datei Upload & Download</h1>

<input type="file" id="fileInput">
<br>

<button onclick="uploadFile()">Datei hochladen</button>

<p id="status"></p>

<h2>Dateiliste</h2>

<button onclick="loadFiles()">Dateien laden</button>

<div id="files"></div>

<script>

const SERVER_URL = "https://htmldownloadserver.onrender.com";

async function uploadFile(){

    const fileInput = document.getElementById("fileInput");

    if(fileInput.files.length === 0){
        alert("Bitte Datei auswählen");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try{

        const response = await fetch(SERVER_URL + "/upload", {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        document.getElementById("status").innerHTML =
            'Upload erfolgreich';

    }catch(err){

        document.getElementById("status").innerText =
            "Fehler beim Upload";

    }

}

async function loadFiles(){

    const filesDiv = document.getElementById("files");

    filesDiv.innerHTML = "Lade Dateien...";

    try{

        const response = await fetch(SERVER_URL + "/files");
        const files = await response.json();

        filesDiv.innerHTML = "";

        files.forEach(file => {

            filesDiv.innerHTML += `
                <div class="file">
                    <a href="${file.url}" download>
                        ${file.name}
                    </a>
                </div>
            `;

        });

    }catch(err){

        filesDiv.innerHTML = "Fehler beim Laden";

    }

}

</script>

</body>
</html>
