<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duel PeerJS Test</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    padding:20px;
}

button{
    padding:10px 15px;
    margin-top:10px;
    cursor:pointer;
}

input{
    padding:10px;
    margin-top:10px;
    width:250px;
}

#log{
    margin-top:20px;
    background:#222;
    padding:10px;
    border-radius:8px;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<h1>Duel Verbindungstest</h1>

<button onclick="createPeer()">Peer starten</button>

<div id="hostSection" style="display:none;">
    <h2>Dein Verbindungscode</h2>
    <h1 id="code"></h1>
</div>

<hr>

<h2>Mit anderem Spieler verbinden</h2>

<input id="joinCode" placeholder="Code eingeben">
<br>
<button onclick="joinPeer()">Verbinden</button>

<div id="log"></div>

<script>

const SERVER_URL = "https://htmldownloadserver.onrender.com";

let peer;
let conn;

function log(text){
    document.getElementById("log").innerHTML += text + "\\n";
}

async function createPeer(){

    peer = new Peer({
        host: "htmldownloadserver.onrender.com",
        secure: true,
        port: 443,
        path: "/peerjs"
    });

    peer.on("open", async (id)=>{

        log("Peer gestartet: " + id);

        const response = await fetch(SERVER_URL + "/register",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                peerId:id
            })
        });

        const result = await response.json();

        document.getElementById("hostSection").style.display = "block";
        document.getElementById("code").innerText = result.code;

        log("Code erstellt: " + result.code);

    });

    peer.on("connection",(connection)=>{

        conn = connection;

        log("Spieler verbunden");

        conn.on("data",(data)=>{
            log("Empfangen: " + data);
        });

    });

    peer.on("error",(err)=>{
        log("Peer Fehler: " + err);
    });

}

async function joinPeer(){

    const code = document.getElementById("joinCode").value.trim();

    if(!code){
        alert("Code eingeben");
        return;
    }

    const response = await fetch(SERVER_URL + "/resolve/" + code);

    if(!response.ok){
        log("Code nicht gefunden");
        return;
    }

    const result = await response.json();

    peer = new Peer({
        host: "htmldownloadserver.onrender.com",
        secure: true,
        port: 443,
        path: "/peerjs"
    });

    peer.on("open",()=>{

        conn = peer.connect(result.peerId);

        conn.on("open",()=>{

            log("Verbunden mit Host");

            conn.send("Hallo vom Client");

        });

        conn.on("data",(data)=>{
            log("Empfangen: " + data);
        });

    });

    peer.on("error",(err)=>{
        log("Fehler: " + err);
    });

}

</script>

</body>
</html>
